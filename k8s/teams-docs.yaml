apiVersion: v1
kind: Namespace
metadata:
  name: teamdocs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teamdocs-app
  namespace: teamdocs
  labels:
    app: teamdocs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teamdocs
  template:
    metadata:
      labels:
        app: teamdocs
    spec:
      hostNetwork: true
      containers:
        - name: gateway
          image: internal.registry/teamdocs/gateway:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            - "uvicorn"
            - "gateway.main:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--app-dir"
            - "/"
          volumeMounts:
            - name: local-cache
              mountPath: /var/cache/teamdocs
        - name: sidecar-docs
          image: internal.registry/teamdocs/docs:latest
          imagePullPolicy: IfNotPresent
      volumes:
        - name: local-cache
          hostPath:
            path: /var/teamdocs/cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: teamdocs-app
  namespace: teamdocs
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: teamdocs
  ports:
    - name: http
      port: 80
      targetPort: 8080
